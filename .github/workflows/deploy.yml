name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - ec2
      - prod
    timeout-minutes: 30

    steps:
      - name: Deploy on self-hosted runner
        shell: bash
        run: |
          set -euo pipefail

          cd ~/h1bfriend

          git fetch origin main
          git reset --hard origin/main

          docker compose run --rm migrate
          docker compose up -d --build

          curl --fail --silent --show-error --retry 20 --retry-delay 2 --retry-all-errors \
            http://127.0.0.1:8089/health >/dev/null

          curl --fail --silent --show-error --insecure --retry 20 --retry-delay 2 --retry-all-errors \
            --resolve h1bfriend.com:443:127.0.0.1 \
            https://h1bfriend.com/api/v1/meta/years >/dev/null
