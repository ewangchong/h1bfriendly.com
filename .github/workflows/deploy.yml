name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Deploy on self-hosted runner
        shell: bash
        run: |
          set -euo pipefail

          cd ~/h1bfriend

          git fetch origin main
          git reset --hard origin/main

          docker compose run --rm migrate
          docker compose up -d --build

          curl --fail --silent --show-error http://127.0.0.1:8089/health >/dev/null
          curl --fail --silent --show-error --insecure https://h1bfriend.com/api/v1/meta/years >/dev/null
