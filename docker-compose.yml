services:
  db:
    image: postgres:16-alpine
    container_name: h1b-db
    environment:
      POSTGRES_DB: h1bfriend
      POSTGRES_USER: h1b
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - h1bfriend-backend_h1bfriend_pgdata:/var/lib/postgresql/data
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h1b -d h1bfriend"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
    container_name: h1b-backend
    ports:
      - "8089:8089"
    environment:
      - DATABASE_URL=postgres://h1b:${POSTGRES_PASSWORD:-postgres}@db:5432/h1bfriend
      - PORT=8089
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    container_name: h1b-web
    expose:
      - "3000"
    environment:
      - H1B_API_BASE_URL=http://backend:8089
      - NEXT_PUBLIC_SITE_URL=https://h1bfriendly.com
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: h1b-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - h1bfriend-caddy_data:/data
      - h1bfriend-caddy_config:/config
    depends_on:
      - web

volumes:
  h1bfriend-backend_h1bfriend_pgdata:
    external: true
  h1bfriend-caddy_data:
  h1bfriend-caddy_config:
